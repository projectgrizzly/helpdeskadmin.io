<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelpDesk — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0d; --surface: #1a1a17; --surface-2: #222220; --border: #2e2e2a;
  --text: #f0efe8; --text-2: #9a9890; --text-3: #5a5955;
  --green: #4ade80; --red: #f87171;
  --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  --radius: 8px; --radius-lg: 14px;
}
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(240,239,232,0.04) 0%, transparent 60%); pointer-events: none; }

.card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px 32px; animation: fade-up .4s ease-out both; }
@keyframes fade-up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.brand-icon { width: 36px; height: 36px; background: var(--text); color: var(--bg); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 600; flex-shrink: 0; }
.brand-name { font-size: 15px; font-weight: 600; }
.brand-sub { font-size: 12px; color: var(--text-3); }

h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; letter-spacing: -.01em; }
.subtitle { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: var(--font); color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
.field input:focus { border-color: rgba(240,239,232,.3); box-shadow: 0 0 0 3px rgba(240,239,232,.06); }
.field input::placeholder { color: var(--text-3); }

.btn-submit { width: 100%; padding: 11px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; margin-top: 8px; transition: opacity .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-submit:hover { opacity: .88; }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; }

.error-msg { display: none; padding: 10px 12px; background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.2); border-radius: var(--radius); font-size: 13px; color: var(--red); margin-bottom: 14px; }
.error-msg.show { display: block; }

.spinner { width: 15px; height: 15px; border: 2px solid rgba(15,15,13,.3); border-top-color: var(--bg); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer-note { text-align: center; font-size: 12px; color: var(--text-3); margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">HD</div>
    <div>
      <div class="brand-name">HelpDesk</div>
      <div class="brand-sub">Admin Portal</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to access the help desk</p>

  <div class="error-msg" id="error-msg"></div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-submit" id="signin-btn" onclick="signIn()">Sign in</button>
  <div class="footer-note">Contact your admin to get access or reset your password.</div>
</div>

<script>// ── auth.js — simple agent-based auth ─────────────────────────────────────

const AUTH_SUPABASE_URL  = 'https://xphtitfasgstjvqkkdvs.supabase.co/rest/v1';
const AUTH_SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwaHRpdGZhc2dzdGp2cWtrZHZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTQzMDQsImV4cCI6MjA5MzQ5MDMwNH0.sjjsfDCeiEWPih2f3eH5rShhvEZZXgS3ApcSy0B0S-M';
const AUTH_SALT          = 'hd_salt_2026';

window.Auth = (() => {
  let session = null;
  let prefs = null;

  const DEFAULT_PREFS = {
    display_name: '',
    widget_layout: ['stat-cards','alert-banner','volume-chart','status-chart','category-chart','agent-table','urgent-table','kb-section'],
    hidden_widgets: [],
    saved_filters: [],
    notify_urgent: true,
    notify_assigned: true,
    notify_resolved: false,
    notify_chat: true
  };

  // ── Hashing ──────────────────────────────────────────────────────────────

  async function hashPassword(password) {
    const msg = password + AUTH_SALT;
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // ── Session ──────────────────────────────────────────────────────────────

  function getSession() {
    if (session) return session;
    try { session = JSON.parse(localStorage.getItem('hd_agent_session') || 'null'); } catch { session = null; }
    return session;
  }

  function getUser() { return getSession()?.agent || null; }
  function getToken() { return AUTH_SUPABASE_KEY; }

  function isLoggedIn() {
    const s = getSession();
    if (!s?.agent) return false;
    if (s.expires_at && Date.now() > s.expires_at) { logout(false); return false; }
    return true;
  }

  async function requireAuth() {
    if (!isLoggedIn()) { window.location.replace('/login'); return false; }
    return true;
  }

  function logout(redirect = true) {
    localStorage.removeItem('hd_agent_session');
    session = null; prefs = null;
    if (redirect) window.location.replace('/login');
  }

  // ── Login ─────────────────────────────────────────────────────────────────

  async function login(email, password) {
    const hash = await hashPassword(password);

    const resp = await fetch(
      `${AUTH_SUPABASE_URL}/agents?email=eq.${encodeURIComponent(email)}&password_hash=eq.${hash}&active=eq.true&select=id,name,email,role,specialties`,
      { headers: { 'apikey': AUTH_SUPABASE_KEY, 'Authorization': `Bearer ${AUTH_SUPABASE_KEY}` } }
    );

    const data = await resp.json();
    if (!data || data.length === 0) throw new Error('Invalid email or password');

    const agent = data[0];
    const sessionId = crypto.randomUUID();

    // Record session in DB
    await fetch(`${AUTH_SUPABASE_URL}/sessions`, {
      method: 'POST',
      headers: {
        'apikey': AUTH_SUPABASE_KEY,
        'Authorization': `Bearer ${AUTH_SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        id: sessionId,
        agent_id: agent.id,
        agent_name: agent.name,
        agent_email: agent.email,
        agent_role: agent.role,
        expires_at: new Date(Date.now() + 8 * 3600 * 1000).toISOString()
      })
    });

    // Update last login
    await fetch(`${AUTH_SUPABASE_URL}/agents?id=eq.${agent.id}`, {
      method: 'PATCH',
      headers: { 'apikey': AUTH_SUPABASE_KEY, 'Authorization': `Bearer ${AUTH_SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ last_login: new Date().toISOString() })
    });

    session = { agent, session_id: sessionId, expires_at: Date.now() + 8 * 3600 * 1000 };
    localStorage.setItem('hd_agent_session', JSON.stringify(session));
    return agent;
  }

  // ── Preferences ──────────────────────────────────────────────────────────

  async function authFetch(path, opts = {}) {
    const resp = await fetch(`${AUTH_SUPABASE_URL}${path}`, {
      ...opts,
      headers: { 'apikey': AUTH_SUPABASE_KEY, 'Authorization': `Bearer ${AUTH_SUPABASE_KEY}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
    });
    if (resp.status === 204 || resp.headers.get('content-length') === '0') return null;
    const text = await resp.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadPrefs() {
    const agent = getUser();
    if (!agent) return { ...DEFAULT_PREFS };
    try {
      const data = await authFetch(`/user_preferences?id=eq.${agent.id}&select=*`);
      if (data && data.length > 0) {
        prefs = { ...DEFAULT_PREFS, ...data[0] };
      } else {
        prefs = { ...DEFAULT_PREFS, display_name: agent.name };
        await authFetch('/user_preferences', {
          method: 'POST',
          headers: { 'Prefer': 'return=minimal' },
          body: JSON.stringify({ id: agent.id, ...prefs })
        });
      }
    } catch(e) { prefs = { ...DEFAULT_PREFS }; }
    return prefs;
  }

  async function savePrefs(updates) {
    const agent = getUser();
    if (!agent) return;
    prefs = { ...prefs, ...updates };
    try {
      await authFetch(`/user_preferences?id=eq.${agent.id}`, {
        method: 'PATCH',
        body: JSON.stringify(updates)
      });
    } catch(e) { console.warn('Failed to save prefs:', e); }
    return prefs;
  }

  function getPrefs() { return prefs || { ...DEFAULT_PREFS }; }

  return { getSession, getToken, getUser, isLoggedIn, requireAuth, logout, login, loadPrefs, savePrefs, getPrefs, authFetch, hashPassword };
})();
</script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) window.location.replace('/');

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email)    return showError('Please enter your email.');
  if (!password) return showError('Please enter your password.');

  document.getElementById('error-msg').classList.remove('show');
  const btn = document.getElementById('signin-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in…';

  try {
    await Auth.login(email, password);
    window.location.replace('/');
  } catch(e) {
    showError(e.message || 'Invalid email or password');
    btn.disabled = false;
    btn.innerHTML = 'Sign in';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
</body>
</html>
